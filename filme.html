<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>LuminaPlay | Filme</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER PADRÃO -->
<header class="site-header" id="siteHeader">
  <div class="header-inner container">

    <div class="logo">
      <span class="logoL">Lumina</span><span class="logoPlay">Play</span>
    </div>

    <nav class="main-nav">
      <a class="nav-link" href="index.html">Início</a>
      <a class="nav-link active" href="filme.html">Filmes</a>
      <a class="nav-link" href="series.html">Séries</a>
      <a class="nav-link" href="minha-lista.html">
        <i class="fa-solid fa-bookmark"></i> Minha Lista
      </a>
    </nav>

    <div class="search-box">
      <input type="text" placeholder="Buscar...">
    </div>

  </div>
</header>

<main>

  <!-- HERO -->
  <section id="filmHero" class="hero">
    <div class="hero-content container">
      <h1 id="filmTitle"></h1>
      <p id="filmInfo" class="hero-overview"></p>
      <p id="filmGenres" class="hero-overview"></p>
      <p id="filmOverview" class="hero-overview"></p>

      <div class="hero-actions">
        <button id="filmWatch" class="btn btn-watch">
          <i class="fa-solid fa-play"></i> Assistir
        </button>
      </div>
    </div>
  </section>

  <!-- SIMILARES -->
  <section class="container" style="margin-top:40px">
    <h3>🎬 Filmes semelhantes</h3>

    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="row-cards" id="similarRow"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

</main>

<!-- PLAYER -->
<div id="playerOverlay" class="player-overlay">
  <div class="player-inner">

    <button id="playerClose" class="player-close">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <iframe id="playerFrame"
      class="player-iframe"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

  </div>
</div>

<footer class="site-footer">
  <div class="container footer-inner">
    <div>© 2026 LuminaPlay</div>
  </div>
</footer>

<script>
(function(){
  const movieJson = localStorage.getItem('lumina_selectedMovie');
  const allMovies = JSON.parse(localStorage.getItem('lumina_allMovies') || '[]');

  if(!movieJson){
    location.href = "index.html";
    return;
  }

  const movie = JSON.parse(movieJson);

  const title = document.getElementById('filmTitle');
  const overview = document.getElementById('filmOverview');
  const info = document.getElementById('filmInfo');
  const genres = document.getElementById('filmGenres');
  const hero = document.getElementById('filmHero');
  const similarRow = document.getElementById('similarRow');

  const playerOverlay = document.getElementById('playerOverlay');
  const playerFrame = document.getElementById('playerFrame');
  const playerClose = document.getElementById('playerClose');

  if(title) title.textContent = movie.title || "Sem título";
  if(overview) overview.textContent = movie.overview || "Sem descrição";
  if(info) info.textContent = `${movie.year || '—'} • ★ ${movie.rating ? Number(movie.rating).toFixed(1) : '—'}`;
  if(genres) genres.textContent = Array.isArray(movie.genres) && movie.genres.length ? movie.genres.join(' • ') : "";
  if(hero && movie.backdrop) hero.style.backgroundImage = `url('${movie.backdrop}')`;

  if(similarRow && allMovies.length){
    const list = shuffle(allMovies).filter(m => m.id !== movie.id).slice(0,8);
    list.forEach(sm => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<img src="${sm.poster || ''}" alt="${sm.title || 'Filme'}">`;
      el.onclick = () => {
        localStorage.setItem('lumina_selectedMovie', JSON.stringify(sm));
        location.reload();
      };
      similarRow.appendChild(el);
    });
  }

  document.querySelectorAll('.row').forEach(row => {
    const left = row.querySelector('.left');
    const right = row.querySelector('.right');
    const container = row.querySelector('.row-cards');
    if(left) left.onclick = () => container.scrollBy({ left: -300, behavior: 'smooth' });
    if(right) right.onclick = () => container.scrollBy({ left: 300, behavior: 'smooth' });
  });

  const watchBtn = document.getElementById('filmWatch');
  if(watchBtn) watchBtn.onclick = () => openPlayer(movie.trailer);

  if(playerClose) playerClose.onclick = closePlayer;
  if(playerOverlay) playerOverlay.onclick = e => { if(e.target === playerOverlay) closePlayer(); };

  function openPlayer(url){
    playerFrame.src = (url || "https://www.youtube.com/embed/dQw4w9WgXcQ") + "?autoplay=1";
    playerOverlay.classList.add('active');
  }

  function closePlayer(){
    playerFrame.src = '';
    playerOverlay.classList.remove('active');
  }

  function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
})();
</script>

<!-- SCROLL HEADER -->
<script>
window.addEventListener("scroll", () => {
  const header = document.getElementById("siteHeader");
  if(window.scrollY > 20){
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
