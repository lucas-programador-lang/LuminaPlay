<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>LuminaPlay | Filme</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner container">

    <div class="logo">
      <span class="logoL">L</span>umina<span class="logoPlay">Play</span>
    </div>

    <nav class="main-nav">
      <a href="index.html">Início</a>
      <a href="filme.html">Filmes</a>
      <a href="series.html">Séries</a>
      <a href="minha-lista.html">Minha Lista</a>
    </nav>

    <button onclick="history.back()" class="btn btn-info" aria-label="Voltar">
      <i class="fa-solid fa-arrow-left"></i>
    </button>

  </div>
</header>

<main>

<!-- HERO -->
<section id="filmHero" class="hero">
  <div class="hero-content container">

    <h1 id="filmTitle"></h1>

    <p id="filmInfo" class="hero-overview"></p>
    <p id="filmGenres" class="hero-overview"></p>
    <p id="filmOverview" class="hero-overview"></p>

    <div class="hero-actions">
      <button id="filmWatch" class="btn btn-watch">
        <i class="fa-solid fa-play"></i> Assistir
      </button>
    </div>

  </div>
</section>

<!-- SIMILARES -->
<section class="container" style="margin-top:40px">
  <h3>🎬 Filmes semelhantes</h3>
  <div class="row-cards" id="similarRow"></div>
</section>

</main>

<!-- PLAYER -->
<div id="playerOverlay" class="player-overlay">
  <div class="player-inner">

    <button id="playerClose" class="player-close" aria-label="Fechar player">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <iframe id="playerFrame" class="player-iframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>

  </div>
</div>

<footer class="site-footer">
  <div class="container footer-inner">
    <div>© 2026 LuminaPlay</div>
  </div>
</footer>

<script>
(function(){

  const movieJson = localStorage.getItem('lumina_selectedMovie');
  const allMovies = JSON.parse(localStorage.getItem('lumina_allMovies') || '[]');

  if(!movieJson){
    location.href = "index.html";
    return;
  }

  const movie = JSON.parse(movieJson);

  const title = document.getElementById('filmTitle');
  const overview = document.getElementById('filmOverview');
  const info = document.getElementById('filmInfo');
  const genres = document.getElementById('filmGenres');
  const hero = document.getElementById('filmHero');
  const similarRow = document.getElementById('similarRow');

  const playerOverlay = document.getElementById('playerOverlay');
  const playerFrame = document.getElementById('playerFrame');
  const playerClose = document.getElementById('playerClose');

  /* ===== DADOS ===== */
  if(title) title.textContent = movie.title || "Sem título";
  if(overview) overview.textContent = movie.overview || "Sem descrição";

  const rating = movie.rating ? Number(movie.rating).toFixed(1) : "—";
  const year = movie.year || "—";

  if(info) info.textContent = `${year} • ★ ${rating}`;

  if(genres){
    genres.textContent = Array.isArray(movie.genres) && movie.genres.length
      ? movie.genres.join(' • ')
      : "";
  }

  if(hero && movie.backdrop){
    hero.style.backgroundImage = `url('${movie.backdrop}')`;
  }

  /* ===== SIMILARES ===== */
  if(similarRow && allMovies.length){

    const list = shuffle(allMovies)
      .filter(m => m.id !== movie.id)
      .slice(0,8);

    list.forEach(sm => {
      const el = document.createElement('div');
      el.className = 'card';

      el.innerHTML = `
        <img src="${sm.poster || ''}" alt="${sm.title || 'Filme'}">
      `;

      el.onclick = () => {
        localStorage.setItem('lumina_selectedMovie', JSON.stringify(sm));
        location.reload();
      };

      similarRow.appendChild(el);
    });
  }

  /* ===== PLAYER ===== */
  const watchBtn = document.getElementById('filmWatch');

  if(watchBtn){
    watchBtn.onclick = () => {
      openPlayer(movie.trailer);
    };
  }

  if(playerClose){
    playerClose.onclick = closePlayer;
  }

  if(playerOverlay){
    playerOverlay.onclick = (e)=>{
      if(e.target === playerOverlay) closePlayer();
    };
  }

  document.addEventListener('keydown', e=>{
    if(e.key === 'Escape') closePlayer();
  });

  function openPlayer(url){
    if(!playerFrame || !playerOverlay) return;

    playerFrame.src = (url || "https://www.youtube.com/embed/dQw4w9WgXcQ") + "?autoplay=1";
    playerOverlay.classList.add('active');
  }

  function closePlayer(){
    if(!playerFrame || !playerOverlay) return;

    playerFrame.src = '';
    playerOverlay.classList.remove('active');
  }

  function shuffle(arr){
    return [...arr].sort(()=>Math.random()-0.5);
  }

})();
</script>

</body>
</html>
