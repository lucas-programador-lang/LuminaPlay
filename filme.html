<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Detalhes do Filme</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">L<span>P</span></div>
        <ul class="nav-links">
            <li onclick="location.href='index.html'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li onclick="location.href='minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li class="active" onclick="location.href='filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li onclick="location.href='series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero" id="filmHero">
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 id="filmTitle">Carregando...</h1>
                    <p id="filmInfo" style="color: #00e5ff; font-weight: bold; margin-bottom: 10px;"></p>
                    <p id="filmOverview" class="hero-overview">Aguarde enquanto buscamos os detalhes do filme.</p>
                    
                    <div class="buttons">
                        <button class="btn-play" id="filmWatch">▶ ASSISTIR AGORA</button>
                        <button class="btn-info" id="addToList">+</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="row">
            <h3>🎬 Filmes semelhantes</h3>
            <div class="carousel-container">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="similarRow">
                    </div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <div id="playerOverlay" class="player-overlay">
        <div class="player-content">
            <span id="playerClose" class="close-btn">&times;</span>
            <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Pega o filme que foi clicado no index.html
            const movieData = localStorage.getItem('lumina_selectedMovie');
            
            if(!movieData) {
                // Se não tiver filme selecionado, volta pro início
                window.location.href = 'index.html';
                return;
            }

            const movie = JSON.parse(movieData);

            // Preenche a página com os dados
            document.getElementById('filmTitle').textContent = movie.title || movie.name;
            document.getElementById('filmOverview').textContent = movie.overview;
            document.getElementById('filmHero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
            document.getElementById('filmInfo').textContent = `${movie.release_date ? movie.release_date.split('-')[0] : '2026'} • ★ ${movie.vote_average.toFixed(1)}`;

            // Botão de Assistir
            document.getElementById('filmWatch').onclick = () => {
                const overlay = document.getElementById('playerOverlay');
                const frame = document.getElementById('playerFrame');
                overlay.classList.add('active');
                frame.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
            };

            // Fechar Player
            document.getElementById('playerClose').onclick = () => {
                document.getElementById('playerOverlay').classList.remove('active');
                document.getElementById('playerFrame').src = "";
            };
        });

        // Configuração simples das setas
        document.querySelectorAll('.handle').forEach(btn => {
            btn.onclick = () => {
                const list = btn.parentElement.querySelector('.movie-list');
                const direction = btn.classList.contains('left') ? -400 : 400;
                list.scrollBy({ left: direction, behavior: 'smooth' });
            };
        });
    </script>
</body>
</html>
