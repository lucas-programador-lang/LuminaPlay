<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Detalhes</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="logo.png" alt="Lumina Play Logo" class="logo-horizontal">
        </div>

        <ul class="nav-links">
            <li onclick="location.href='index.html'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar" onclick="location.href='index.html'"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li onclick="location.href='minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li class="active" onclick="location.href='filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li onclick="location.href='series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero" id="filmHero">
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 id="filmTitle">Carregando...</h1>
                    <p id="filmInfo" style="color: #00e5ff; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0,229,255,0.4);"></p>
                    <p id="filmOverview" class="hero-overview">Aguarde enquanto buscamos os detalhes.</p>
                    
                    <div class="hero-buttons">
                        <button class="btn-play" id="filmWatch">▶ ASSISTIR AGORA</button>
                        <button class="btn-info" id="addToList" title="Adicionar à Lista">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="row">
            <h3>
                <i class="fa-solid fa-clapperboard" style="color: #00e5ff; text-shadow: 0 0 12px rgba(0, 229, 255, 0.8); margin-right: 12px;"></i>
                Filmes semelhantes
            </h3>
            
            <div class="carousel-container" style="position: relative;">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="similarRow"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <div id="playerOverlay" class="player-overlay">
        <div class="player-content">
            <span id="playerClose" class="close-btn">&times;</span>
            <iframe id="playerFrame" src="" frameborder="0" allow="encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_KEY = "d552c7ad4779e6d50cb6de2ac397c6dd";

        document.addEventListener('DOMContentLoaded', async () => {
            const movieData = localStorage.getItem('lumina_selectedMovie');
            
            if(!movieData) {
                window.location.href = 'index.html';
                return;
            }

            const movie = JSON.parse(movieData);
            const type = movie.title ? 'movie' : 'tv';

            // --- ATUALIZAÇÃO DA INTERFACE ---
            document.title = `Lumina Play | ${movie.title || movie.name}`;
            document.getElementById('filmTitle').textContent = movie.title || movie.name;
            document.getElementById('filmOverview').textContent = movie.overview || "Sinopse não disponível.";
            
            const bgPath = movie.backdrop_path ? `https://image.tmdb.org/t/p/original${movie.backdrop_path}` : `https://image.tmdb.org/t/p/original${movie.poster_path}`;
            document.getElementById('filmHero').style.backgroundImage = `linear-gradient(to top, #040714 10%, transparent 60%), url(${bgPath})`;
            
            const year = (movie.release_date || movie.first_air_date || "---").split('-')[0];
            const rating = movie.vote_average ? movie.vote_average.toFixed(1) : "N/A";
            document.getElementById('filmInfo').textContent = `${year} • ★ ${rating}`;

            updateListButton(movie.id);
            fetchSimilar(movie.id, type);

            // --- LÓGICA DO PLAYER DINÂMICO ---
            document.getElementById('filmWatch').onclick = async () => {
                const overlay = document.getElementById('playerOverlay');
                const frame = document.getElementById('playerFrame');

                overlay.classList.add('active');

                try {
                    // 1. Buscamos o ID Externo (IMDB) para garantir que o player encontre o filme correto
                    const response = await fetch(`https://api.themoviedb.org/3/${type}/${movie.id}/external_ids?api_key=${API_KEY}`);
                    const ids = await response.json();
                    const imdbId = ids.imdb_id;

                    // 2. Montamos a URL do Player (Usando Warez ou SuperEmbed para maior compatibilidade com TMDB/IMDB)
                    if (imdbId) {
                        // Se for Série, o player costuma precisar de um tratamento diferente para temporadas
                        const embedBase = type === 'movie' ? 'https://embed.warezcdn.com/filme/' : 'https://embed.warezcdn.com/serie/';
                        frame.src = `${embedBase}${imdbId}`;
                    } else {
                        // Backup caso não tenha IMDB
                        frame.src = `https://embed.warezcdn.com/${type}/${movie.id}`;
                    }
                } catch (err) {
                    console.error("Erro ao carregar o player:", err);
                    alert("Não foi possível carregar o player para este título.");
                }
            };

            document.getElementById('playerClose').onclick = () => {
                document.getElementById('playerOverlay').classList.remove('active');
                document.getElementById('playerFrame').src = ""; 
            };

            // Lógica da Lista
            document.getElementById('addToList').onclick = () => {
                let favs = JSON.parse(localStorage.getItem("luminaLista") || "[]");
                const index = favs.findIndex(item => item.id === movie.id);
                if (index === -1) favs.push(movie);
                else favs.splice(index, 1);
                localStorage.setItem("luminaLista", JSON.stringify(favs));
                updateListButton(movie.id);
            };
        });

        // Funções auxiliares mantidas (fetchSimilar, updateListButton, handles)
        function updateListButton(movieId) {
            const btnAdd = document.getElementById('addToList');
            let favs = JSON.parse(localStorage.getItem("luminaLista") || "[]");
            const isFav = favs.find(item => item.id === movieId);
            btnAdd.innerHTML = isFav ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-plus"></i>';
            btnAdd.style.color = isFav ? "#00e5ff" : "white";
            btnAdd.style.borderColor = isFav ? "#00e5ff" : "white";
        }

        async function fetchSimilar(id, type) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}/recommendations?api_key=${API_KEY}&language=pt-BR`);
                const data = await res.json();
                const container = document.getElementById('similarRow');
                container.innerHTML = "";
                data.results?.forEach(m => {
                    if(!m.poster_path) return;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title || m.name}">`;
                    card.onclick = () => {
                        localStorage.setItem('lumina_selectedMovie', JSON.stringify(m));
                        window.location.reload();
                    };
                    container.appendChild(card);
                });
            } catch (err) { console.error(err); }
        }

        document.querySelectorAll('.handle').forEach(btn => {
            btn.onclick = () => {
                const list = btn.parentElement.querySelector('.movie-list');
                list.scrollBy({ left: btn.classList.contains('left') ? -450 : 450, behavior: 'smooth' });
            };
        });
    </script>
</body>
</html>
