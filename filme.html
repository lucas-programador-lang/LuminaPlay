<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Detalhes do Filme</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="logo.png" alt="Lumina Play Logo">
        </div>

        <ul class="nav-links">
            <li onclick="location.href='index.html'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar" onclick="location.href='index.html'"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li onclick="location.href='minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li class="active" onclick="location.href='filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li onclick="location.href='series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero" id="filmHero" style="background-size: cover; background-position: center;">
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 id="filmTitle">Carregando...</h1>
                    <p id="filmInfo" style="color: #00e5ff; font-weight: bold; margin-bottom: 10px;"></p>
                    <p id="filmOverview" class="hero-overview">Aguarde enquanto buscamos os detalhes.</p>
                    
                    <div class="buttons">
                        <button class="btn-play" id="filmWatch">▶ ASSISTIR AGORA</button>
                        <button class="btn-info" id="addToList" title="Adicionar à Lista">+</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="row">
            <h3>🎬 Filmes semelhantes</h3>
            <div class="carousel-container">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="similarRow">
                    </div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <div id="playerOverlay" class="player-overlay">
        <div class="player-content">
            <span id="playerClose" class="close-btn">&times;</span>
            <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const movieData = localStorage.getItem('lumina_selectedMovie');
            
            if(!movieData) {
                window.location.href = 'index.html';
                return;
            }

            const movie = JSON.parse(movieData);

            // Preenchimento dos dados
            document.getElementById('filmTitle').textContent = movie.title || movie.name;
            document.getElementById('filmOverview').textContent = movie.overview || "Sinopse não disponível para este título.";
            
            // Fundo do Hero
            const bgPath = movie.backdrop_path ? `https://image.tmdb.org/t/p/original${movie.backdrop_path}` : `https://image.tmdb.org/t/p/original${movie.poster_path}`;
            document.getElementById('filmHero').style.backgroundImage = `url(${bgPath})`;
            
            // Info Ano e Nota
            const year = (movie.release_date || movie.first_air_date || "2026").split('-')[0];
            const rating = movie.vote_average ? movie.vote_average.toFixed(1) : "N/A";
            document.getElementById('filmInfo').textContent = `${year} • ★ ${rating}`;

            // --- LÓGICA DO PLAYER ---
            document.getElementById('filmWatch').onclick = () => {
                const overlay = document.getElementById('playerOverlay');
                const frame = document.getElementById('playerFrame');
                overlay.classList.add('active');
                // Link de exemplo (Rickroll) ou link dinâmico se tiver
                frame.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
            };

            document.getElementById('playerClose').onclick = () => {
                document.getElementById('playerOverlay').classList.remove('active');
                document.getElementById('playerFrame').src = "";
            };

            // --- LÓGICA DA MINHA LISTA ---
            document.getElementById('addToList').onclick = () => {
                let favs = JSON.parse(localStorage.getItem("luminaLista") || "[]");
                
                // Verifica se já existe para não duplicar
                const exists = favs.find(item => item.id === movie.id);
                
                if (!exists) {
                    favs.push(movie);
                    localStorage.setItem("luminaLista", JSON.stringify(favs));
                    alert("✅ Adicionado à sua lista!");
                } else {
                    alert("ℹ️ Este filme já está na sua lista.");
                }
            };
        });

        // Scroll do Carrossel
        document.querySelectorAll('.handle').forEach(btn => {
            btn.onclick = () => {
                const list = btn.parentElement.querySelector('.movie-list');
                const direction = btn.classList.contains('left') ? -400 : 400;
                list.scrollBy({ left: direction, behavior: 'smooth' });
            };
        });
    </script>
</body>
</html>
