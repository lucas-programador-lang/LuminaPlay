<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuminaPlay | Filme</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* HERO */

.movie-hero{
position:relative;
min-height:80vh;
display:flex;
align-items:flex-end;
padding:60px;
background-size:cover;
background-position:center;
}

.movie-hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.3));
}

.movie-hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.movie-title{
font-size:48px;
margin-bottom:10px;
}

.movie-overview{
opacity:.85;
margin-bottom:20px;
}

/* BOTÃO GRANDE */

.btn-play{
background:#ff004c;
border:none;
padding:14px 26px;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

.btn-back{
background:#222;
border:none;
padding:12px 20px;
border-radius:6px;
color:white;
cursor:pointer;
margin-left:10px;
}

/* ==========================
PLAYER NETFLIX
========================== */

.player-overlay{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:black;

display:none;
justify-content:center;
align-items:center;

z-index:9999;

}

.player-overlay.active{
display:flex;
}

.player-frame{
width:90%;
height:80%;
border:none;
}

/* BOTÃO FECHAR */

.close-player{

position:absolute;
top:20px;
right:30px;

font-size:40px;
color:white;

cursor:pointer;
z-index:10000;

}

</style>

</head>

<body>

<header>

<div class="logo">
<span class="logoL">L</span>umina<span class="logoPlay">Play</span>
</div>

<nav>
<a href="index.html">Início</a>
<a href="filmes.html">Filmes</a>
</nav>

</header>

<!-- HERO -->

<section id="movieHero" class="movie-hero">

<div class="movie-hero-content">

<h1 id="movieTitle" class="movie-title"></h1>

<p id="movieOverview" class="movie-overview"></p>

<button id="playBtn" class="btn-play">
▶ Assistir
</button>

<button onclick="history.back()" class="btn-back">
⬅ Voltar
</button>

</div>

</section>

<!-- PLAYER -->

<div id="player" class="player-overlay">

<div class="close-player" id="closePlayer">×</div>

<iframe id="playerFrame" class="player-frame" allow="autoplay" allowfullscreen></iframe>

</div>

<script>

const API_KEY = "d552c7ad4779e6d50cb6de2ac397c6dd"

const movie = JSON.parse(localStorage.getItem("selectedMovie"))

const hero = document.getElementById("movieHero")
const title = document.getElementById("movieTitle")
const overview = document.getElementById("movieOverview")

const player = document.getElementById("player")
const playerFrame = document.getElementById("playerFrame")
const closePlayer = document.getElementById("closePlayer")
const playBtn = document.getElementById("playBtn")

if(!movie){
document.body.innerHTML = "<h2 style='padding:40px'>Filme não encontrado</h2>"
}else{

title.textContent = movie.title
overview.textContent = movie.overview

if(movie.backdrop_path){
hero.style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`
}


// ABRIR PLAYER

async function openPlayer(){

try{

const res = await fetch(
`https://api.themoviedb.org/3/movie/${movie.id}/videos?api_key=${API_KEY}`
)

const data = await res.json()

const video = data.results.find(v => v.type === "Trailer")

if(video){

playerFrame.src =
`https://www.youtube.com/embed/${video.key}?autoplay=1`

player.classList.add("active")

}

}catch(e){
console.log(e)
}

}

playBtn.addEventListener("click", openPlayer)


// FECHAR PLAYER

closePlayer.addEventListener("click", () => {

player.classList.remove("active")
playerFrame.src = ""

})

}

</script>

</body>
</html>
