<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>LuminaPlay | Séries</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER CORRIGIDO -->
<header class="site-header">
  <div class="header-inner container">

    <div class="logo">
      <span class="logoL">L</span>umina<span class="logoPlay">Play</span>
    </div>

    <nav class="main-nav">
      <a href="index.html">Início</a>
      <a href="filme.html">Filmes</a>
      <a href="series.html" class="active">Séries</a>
      <a href="minha-lista.html">Minha Lista</a>
    </nav>

    <button onclick="history.back()" class="btn btn-info">
      <i class="fa-solid fa-arrow-left"></i>
    </button>

  </div>
</header>

<!-- HERO -->
<section id="hero" class="hero">
  <div class="hero-content container">
    <h1 id="heroTitle">Carregando...</h1>
    <p id="heroOverview"></p>
  </div>
</section>

<!-- ROWS -->
<section class="rows container">

  <!-- POPULARES -->
  <section>
    <h2 class="row-title">🔥 Populares</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="row-cards" id="row-populares"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

  <!-- EM ALTA -->
  <section>
    <h2 class="row-title">⭐ Em Alta</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="row-cards" id="row-emalta"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

  <!-- TOP -->
  <section>
    <h2 class="row-title">🏆 Mais bem avaliadas</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="row-cards" id="row-top"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

</section>

<!-- PLAYER -->
<div id="playerOverlay" class="player-overlay">
  <div class="player-inner">
    <button id="playerClose" class="player-close">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <iframe id="playerFrame" class="player-iframe"></iframe>
  </div>
</div>

<footer class="site-footer">
  <div class="container footer-inner">
    <div>LuminaPlay</div>
  </div>
</footer>

<script>
const API_KEY = "d552c7ad4779e6d50cb6de2ac397c6dd";
const BASE = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";

const rows = {
  populares: document.getElementById('row-populares'),
  emalta: document.getElementById('row-emalta'),
  top: document.getElementById('row-top')
};

const hero = document.getElementById('hero');

/* ===== SKELETON ===== */
function showSkeleton(id){
  const row = document.getElementById(id);
  if(!row) return;

  row.innerHTML = "";
  for(let i=0;i<8;i++){
    const s = document.createElement("div");
    s.className = "skeleton";
    row.appendChild(s);
  }
}

/* ===== API ===== */
async function getSeries(endpoint){
  try{
    const res = await fetch(`${BASE}${endpoint}?api_key=${API_KEY}&language=pt-BR`);
    const data = await res.json();

    return data.results.map(s => ({
      id: s.id,
      title: s.name,
      poster: s.poster_path ? IMG + s.poster_path : "",
      backdrop: s.backdrop_path ? IMG + s.backdrop_path : "",
      overview: s.overview
    }));
  }catch{
    return [];
  }
}

/* ===== INIT ===== */
async function init(){

  showSkeleton("row-populares");
  showSkeleton("row-emalta");
  showSkeleton("row-top");

  const populares = await getSeries("/tv/popular");
  const emAlta = await getSeries("/trending/tv/week");
  const top = await getSeries("/tv/top_rated");

  if(populares.length){
    renderHero(populares[0]);
  }

  renderRow("populares", populares);
  renderRow("emalta", emAlta);
  renderRow("top", top);

  setupArrows();
  setupPlayer();
}

/* ===== HERO ===== */
function renderHero(s){
  hero.style.backgroundImage = `url('${s.backdrop}')`;
  document.getElementById('heroTitle').textContent = s.title;
  document.getElementById('heroOverview').textContent = s.overview;
}

/* ===== ROW ===== */
function renderRow(key, list){
  const container = rows[key];
  if(!container) return;

  container.innerHTML = "";

  list.forEach(s => {
    const card = document.createElement('div');
    card.className = "card";

    card.innerHTML = `<img src="${s.poster}">`;

    card.onclick = () => openPlayer();

    container.appendChild(card);
  });
}

/* ===== SETAS FUNCIONANDO ===== */
function setupArrows(){
  document.querySelectorAll('.row').forEach(row => {
    const left = row.querySelector('.left');
    const right = row.querySelector('.right');
    const container = row.querySelector('.row-cards');

    left?.addEventListener('click', () => {
      container.scrollBy({ left: -container.clientWidth * 0.8, behavior: 'smooth' });
    });

    right?.addEventListener('click', () => {
      container.scrollBy({ left: container.clientWidth * 0.8, behavior: 'smooth' });
    });
  });
}

/* ===== PLAYER ===== */
function openPlayer(){
  document.getElementById('playerOverlay').classList.add('active');
  document.getElementById('playerFrame').src =
    "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
}

function setupPlayer(){
  const overlay = document.getElementById('playerOverlay');
  const frame = document.getElementById('playerFrame');

  document.getElementById('playerClose').onclick = close;

  overlay.onclick = (e)=>{
    if(e.target === overlay) close();
  };

  document.addEventListener('keydown', e=>{
    if(e.key === "Escape") close();
  });

  function close(){
    overlay.classList.remove('active');
    frame.src = "";
  }
}

init();
</script>

</body>
</html>
