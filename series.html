<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Séries</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">L<span>P</span></div>
        <ul class="nav-links">
            <li onclick="location.href='index.html'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li onclick="location.href='minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li onclick="location.href='filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li class="active" onclick="location.href='series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero" id="hero">
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 id="heroTitle">Séries Lumina</h1>
                    <p id="heroOverview">As séries mais assistidas do momento, agora em um só lugar.</p>
                    <div class="buttons">
                        <button class="btn-play" id="heroWatch">▶ ASSISTIR AGORA</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="row">
            <h3>🔥 Séries Populares</h3>
            <div class="carousel-container">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-populares"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="row">
            <h3>⭐ Em Alta</h3>
            <div class="carousel-container">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-emalta"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="row">
            <h3>🏆 Mais bem avaliadas</h3>
            <div class="carousel-container">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-top"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <div id="playerOverlay" class="player-overlay">
        <div class="player-content">
            <span id="playerClose" class="close-btn">&times;</span>
            <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_KEY = "d552c7ad4779e6d50cb6de2ac397c6dd";
        const BASE = "https://api.themoviedb.org/3";
        const IMG = "https://image.tmdb.org/t/p/original";

        async function fetchSeries(endpoint) {
            const res = await fetch(`${BASE}${endpoint}?api_key=${API_KEY}&language=pt-BR`);
            const data = await res.json();
            return data.results;
        }

        function renderRow(id, series) {
            const container = document.getElementById(id);
            container.innerHTML = "";
            series.forEach(s => {
                if(!s.poster_path) return;
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${s.poster_path}" alt="${s.name}">`;
                card.onclick = () => {
                    // Reutilizamos a lógica de detalhes, adaptando para série
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(s));
                    window.location.href = 'filme.html'; // Usamos a mesma página de detalhes
                };
                container.appendChild(card);
            });
        }

        async function init() {
            const populares = await fetchSeries("/tv/popular");
            const emAlta = await fetchSeries("/trending/tv/week");
            const top = await fetchSeries("/tv/top_rated");

            if(populares.length) {
                const heroS = populares[0];
                document.getElementById('hero').style.backgroundImage = `url(${IMG}${heroS.backdrop_path})`;
                document.getElementById('heroTitle').textContent = heroS.name;
                document.getElementById('heroOverview').textContent = heroS.overview.substring(0, 150) + "...";
            }

            renderRow("row-populares", populares);
            renderRow("row-emalta", emAlta);
            renderRow("row-top", top);
        }

        // Setas do Carrossel
        document.querySelectorAll('.handle').forEach(btn => {
            btn.onclick = () => {
                const list = btn.parentElement.querySelector('.movie-list');
                const direction = btn.classList.contains('left') ? -450 : 450;
                list.scrollBy({ left: direction, behavior: 'smooth' });
            };
        });

        init();
    </script>
</body>
</html>
