<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Séries</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="logo.png" alt="Lumina Play Logo" class="logo-horizontal">
        </div>

        <ul class="nav-links">
            <li onclick="location.href='index.html'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar" onclick="location.href='index.html'"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li onclick="location.href='minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li onclick="location.href='filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li class="active" onclick="location.href='series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero" id="hero">
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 id="heroTitle">Séries Lumina</h1>
                    <p id="heroOverview" class="hero-overview">As séries mais assistidas do momento, agora em um só lugar.</p>
                    <div class="hero-buttons">
                        <button class="btn-play" id="heroWatch">▶ ASSISTIR AGORA</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="row">
            <h3>
                <i class="fa-solid fa-fire-flame-curved" style="color: #00e5ff; text-shadow: 0 0 12px rgba(0, 229, 255, 0.8); margin-right: 12px;"></i>
                Séries Populares
            </h3>
            <div class="carousel-container" style="position: relative;">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-populares"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="row">
            <h3>
                <i class="fa-solid fa-star" style="color: #00e5ff; text-shadow: 0 0 12px rgba(0, 229, 255, 0.8); margin-right: 12px;"></i>
                Em Alta na Semana
            </h3>
            <div class="carousel-container" style="position: relative;">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-emalta"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="row">
            <h3>
                <i class="fa-solid fa-trophy" style="color: #00e5ff; text-shadow: 0 0 12px rgba(0, 229, 255, 0.8); margin-right: 12px;"></i>
                Melhores Avaliadas
            </h3>
            <div class="carousel-container" style="position: relative;">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-top"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "d552c7ad4779e6d50cb6de2ac397c6dd";
        const BASE = "https://api.themoviedb.org/3";
        const IMG = "https://image.tmdb.org/t/p/original";

        async function fetchSeries(endpoint) {
            try {
                const res = await fetch(`${BASE}${endpoint}?api_key=${API_KEY}&language=pt-BR`);
                const data = await res.json();
                return data.results || [];
            } catch (err) {
                console.error("Erro ao buscar séries:", err);
                return [];
            }
        }

        function renderRow(id, series) {
            const container = document.getElementById(id);
            if (!container) return;
            container.innerHTML = "";
            
            series.forEach(s => {
                if(!s.poster_path) return;
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${s.poster_path}" alt="${s.name}" loading="lazy">`;
                
                card.onclick = () => {
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(s));
                    window.location.href = 'filme.html';
                };
                container.appendChild(card);
            });
        }

        async function init() {
            const [populares, emAlta, top] = await Promise.all([
                fetchSeries("/tv/popular"),
                fetchSeries("/trending/tv/week"),
                fetchSeries("/tv/top_rated")
            ]);

            // Configuração do Hero Dinâmico
            if(populares.length) {
                const heroS = populares[Math.floor(Math.random() * 5)];
                const bg = heroS.backdrop_path ? `${IMG}${heroS.backdrop_path}` : `${IMG}${heroS.poster_path}`;
                
                // Melhorando o gradiente para leitura de texto
                document.getElementById('hero').style.backgroundImage = 
                    `linear-gradient(to right, rgba(4, 7, 20, 0.9) 20%, transparent 80%), 
                     linear-gradient(to top, #040714 10%, transparent 40%), url(${bg})`;
                
                document.getElementById('heroTitle').textContent = heroS.name;
                
                const overview = heroS.overview || "Entre no universo desta série incrível disponível agora na Lumina Play.";
                document.getElementById('heroOverview').textContent = overview.length > 200 ? overview.substring(0, 200) + "..." : overview;
                
                document.getElementById('heroWatch').onclick = () => {
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(heroS));
                    window.location.href = 'filme.html';
                };
            }

            renderRow("row-populares", populares);
            renderRow("row-emalta", emAlta);
            renderRow("row-top", top);
        }

        document.querySelectorAll('.handle').forEach(btn => {
            btn.onclick = () => {
                const list = btn.parentElement.querySelector('.movie-list');
                const direction = btn.classList.contains('left') ? -600 : 600;
                list.scrollBy({ left: direction, behavior: 'smooth' });
            };
        });

        init();
    </script>
</body>
</html>
