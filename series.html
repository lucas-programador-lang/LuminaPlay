<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Séries</title>
    
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container" onclick="window.location.href='/'" style="cursor: pointer;">
            <img src="/logo.png" alt="Lumina Play Logo" class="logo-horizontal">
        </div>

        <ul class="nav-links">
            <li onclick="window.location.href='/'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar" onclick="window.location.href='/'"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li onclick="window.location.href='/minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li onclick="window.location.href='/filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li class="active" onclick="window.location.href='/series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero" id="hero" style="min-height: 85vh;">
            <div class="hero-overlay" style="background: linear-gradient(to right, #040714 15%, rgba(4, 7, 20, 0.6) 50%, transparent 100%), linear-gradient(to top, #040714 5%, transparent 40%);">
                <div class="hero-content">
                    <h1 id="heroTitle" style="font-size: 3.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">Carregando...</h1>
                    <p id="heroOverview" class="hero-overview" style="max-width: 600px; font-size: 1.1rem; margin-bottom: 30px;">Buscando as melhores histórias para você.</p>
                    <div class="hero-buttons">
                        <button class="btn-play" id="heroWatch">▶ ASSISTIR AGORA</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="row">
            <h3><i class="fa-solid fa-fire-flame-curved" style="color: #00e5ff; margin-right: 12px;"></i> Séries Populares</h3>
            <div class="carousel-container" style="position: relative;">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-populares"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="row">
            <h3><i class="fa-solid fa-star" style="color: #00e5ff; margin-right: 12px;"></i> Em Alta na Semana</h3>
            <div class="carousel-container" style="position: relative;">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-emalta"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="row">
            <h3><i class="fa-solid fa-trophy" style="color: #00e5ff; margin-right: 12px;"></i> Melhores Avaliadas</h3>
            <div class="carousel-container" style="position: relative;">
                <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="movie-list row-cards" id="row-top"></div>
                <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "d552c7ad4779e6d50cb6de2ac397c6dd";
        const BASE = "https://api.themoviedb.org/3";
        const IMG = "https://image.tmdb.org/t/p/original";

        async function fetchSeries(endpoint) {
            try {
                const res = await fetch(`${BASE}${endpoint}?api_key=${API_KEY}&language=pt-BR`);
                const data = await res.json();
                return data.results || [];
            } catch (err) {
                console.error("Erro na API:", err);
                return [];
            }
        }

        function renderRow(id, series) {
            const container = document.getElementById(id);
            if (!container) return;
            container.innerHTML = "";
            
            series.forEach(s => {
                if(!s.poster_path) return;
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${s.poster_path}" alt="${s.name}" loading="lazy">`;
                
                card.onclick = () => {
                    s.media_type = 'tv'; 
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(s));
                    window.location.href = '/filme.html';
                };
                container.appendChild(card);
            });
        }

        async function init() {
            const [populares, emAlta, top] = await Promise.all([
                fetchSeries("/tv/popular"),
                fetchSeries("/trending/tv/week"),
                fetchSeries("/tv/top_rated")
            ]);

            if(populares.length) {
                const heroS = populares[Math.floor(Math.random() * Math.min(populares.length, 10))];
                const bg = heroS.backdrop_path ? `${IMG}${heroS.backdrop_path}` : `${IMG}${heroS.poster_path}`;
                
                const heroEl = document.getElementById('hero');
                heroEl.style.backgroundImage = `url(${bg})`;
                heroEl.style.backgroundSize = "cover";
                heroEl.style.backgroundPosition = "center top";
                
                document.getElementById('heroTitle').textContent = heroS.name;
                
                const overview = heroS.overview || "Descubra uma nova história épica agora na Lumina Play.";
                document.getElementById('heroOverview').textContent = overview.length > 250 ? overview.substring(0, 250) + "..." : overview;
                
                document.getElementById('heroWatch').onclick = () => {
                    heroS.media_type = 'tv';
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(heroS));
                    window.location.href = '/filme.html';
                };
            }

            renderRow("row-populares", populares);
            renderRow("row-emalta", emAlta);
            renderRow("row-top", top);
        }

        document.querySelectorAll('.handle').forEach(btn => {
            btn.onclick = () => {
                const list = btn.parentElement.querySelector('.movie-list');
                const scrollX = window.innerWidth > 768 ? 800 : 400;
                list.scrollBy({ left: btn.classList.contains('left') ? -scrollX : scrollX, behavior: 'smooth' });
            };
        });

        init();
    </script>
</body>
</html>
