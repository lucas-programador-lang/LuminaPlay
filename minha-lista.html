<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Minha Lista</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">L<span>P</span></div>
        <ul class="nav-links">
            <li onclick="location.href='index.html'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li class="active" onclick="location.href='minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li onclick="location.href='filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li onclick="location.href='series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <header style="padding: 40px 50px 10px;">
            <h2 style="font-size: 2rem; border-left: 4px solid #00e5ff; padding-left: 15px;">📌 Minha Lista</h2>
            <p style="opacity: 0.6; margin-top: 10px;">Seus filmes e séries favoritos guardados aqui.</p>
        </header>

        <div class="row">
            <div class="carousel-container">
                <div class="movie-list row-cards" id="lista" style="flex-wrap: wrap; gap: 20px;">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const listaContainer = document.getElementById("lista");

        function getFav() {
            // Buscamos a lista que o script.js salva (luminaLista)
            return JSON.parse(localStorage.getItem("luminaLista") || "[]");
        }

        function render() {
            if (!listaContainer) return;
            listaContainer.innerHTML = "";
            const favs = getFav();

            if (favs.length === 0) {
                listaContainer.innerHTML = `
                    <div style="text-align: center; width: 100%; padding: 50px; opacity: 0.5;">
                        <i class="fa-solid fa-ghost" style="font-size: 3rem; margin-bottom: 20px;"></i>
                        <p>Sua lista está vazia. Adicione algo no Início!</p>
                    </div>`;
                return;
            }

            favs.forEach(item => {
                const card = document.createElement("div");
                card.className = "card";
                card.style.position = "relative";

                // Imagem do Filme/Série
                const imgPath = item.poster_path ? 'https://image.tmdb.org/t/p/w500' + item.poster_path : 'https://via.placeholder.com/500x750?text=Sem+Imagem';
                
                card.innerHTML = `
                    <img src="${imgPath}" alt="${item.title || item.name}">
                    <button class="remove-btn" title="Remover da lista">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;

                // Clique para ver detalhes
                card.onclick = () => {
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(item));
                    window.location.href = 'filme.html';
                };

                // Botão de remover (estilizado via JS rápido)
                const btn = card.querySelector(".remove-btn");
                btn.style.cssText = `
                    position: absolute; top: 10px; right: 10px; 
                    background: rgba(255,0,0,0.8); border: none; 
                    color: white; border-radius: 50%; width: 30px; 
                    height: 30px; cursor: pointer; z-index: 5;
                    display: flex; align-items: center; justify-content: center;
                    transition: 0.3s;
                `;
                
                btn.onclick = (e) => {
                    e.stopPropagation(); // Não abre os detalhes ao clicar no X
                    remove(item.id);
                };

                listaContainer.appendChild(card);
            });
        }

        function remove(id) {
            let favs = getFav().filter(m => m.id !== id);
            localStorage.setItem("luminaLista", JSON.stringify(favs));
            render();
        }

        // Inicializa a página
        render();
    </script>

    <style>
        /* Ajuste extra para a grade da Minha Lista */
        .movie-list {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            width: 100%;
        }
        .remove-btn:hover {
            transform: scale(1.2);
            background: red !important;
        }
    </style>
</body>
</html>
