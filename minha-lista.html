<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Minha Lista</title>
    
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="manifest" href="/manifest.json">

    <style>
        .content { min-height: 100vh; } 

        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 30px;
            padding: 20px 4%;
            width: 100%;
        }

        .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 35px;
            height: 35px;
            background: #ff4b2b;
            border: none;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            opacity: 0; 
            transform: scale(0.5);
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.5);
        }

        .card:hover .remove-btn {
            opacity: 1;
            transform: scale(1);
        }

        .remove-btn:hover {
            background: #ff0000;
            transform: scale(1.2) !important;
        }

        .removing {
            transform: scale(0) rotate(15deg);
            opacity: 0;
            transition: 0.4s;
        }

        .empty-list-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-back {
            margin-top: 25px;
            padding: 12px 30px;
            border-radius: 30px;
            border: 2px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-back:hover {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        @media (max-width: 768px) {
            .fav-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 15px;
            }
            .remove-btn { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container" onclick="window.location.href='/'" style="cursor: pointer;">
            <img src="/logo.png" alt="Lumina Play Logo" class="logo-horizontal">
        </div>

        <ul class="nav-links">
            <li onclick="window.location.href='/'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar" onclick="window.location.href='/'"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li class="active" onclick="window.location.href='/minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li onclick="window.location.href='/filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li onclick="window.location.href='/series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <header style="padding: 60px 4% 20px; margin-top: 20px;">
            <h2 style="font-size: 2.5rem; font-weight: 800; display: flex; align-items: center;">
                <i class="fa-solid fa-bookmark" style="color: #00e5ff; margin-right: 15px; filter: drop-shadow(0 0 8px #00e5ff);"></i>
                Minha Lista
            </h2>
            <p style="opacity: 0.6; margin-top: 5px; font-size: 1.1rem;">Seus filmes e séries favoritos salvos para assistir depois.</p>
        </header>

        <div id="lista" class="fav-grid"></div>
    </main>

    <script>
        const listaContainer = document.getElementById("lista");

        function getFav() {
            return JSON.parse(localStorage.getItem("luminaLista") || "[]");
        }

        function render() {
            if (!listaContainer) return;
            const favs = getFav();

            if (favs.length === 0) {
                listaContainer.innerHTML = `
                    <div class="empty-list-container">
                        <i class="fa-solid fa-clapperboard" style="font-size: 5rem; margin-bottom: 20px; display: block; opacity: 0.2;"></i>
                        <p style="font-size: 1.3rem;">Sua lista está vazia por enquanto.</p>
                        <button class="btn-back" onclick="window.location.href='/'">Explorar Catálogo</button>
                    </div>`;
                return;
            }

            listaContainer.innerHTML = "";

            favs.forEach(item => {
                const card = document.createElement("div");
                card.className = "card";
                card.id = `card-${item.id}`;

                const imgPath = item.poster_path ? 'https://image.tmdb.org/t/p/w500' + item.poster_path : 'https://via.placeholder.com/500x750?text=Sem+Imagem';
                
                card.innerHTML = `
                    <img src="${imgPath}" alt="${item.title || item.name}" class="movie-img" loading="lazy">
                    <button class="remove-btn" title="Remover da lista" onclick="removeMovie(event, ${item.id})">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;

                // Clique na imagem agora aponta para a rota absoluta
                card.querySelector('.movie-img').onclick = () => {
                    if (!item.media_type) {
                        item.media_type = (item.title || item.release_date) ? 'movie' : 'tv';
                    }
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(item));
                    window.location.href = '/filme.html';
                };

                listaContainer.appendChild(card);
            });
        }

        function removeMovie(event, id) {
            event.stopPropagation();
            const card = document.getElementById(`card-${id}`);
            if(card) {
                card.classList.add('removing'); 
                setTimeout(() => {
                    let favs = getFav().filter(m => m.id !== id);
                    localStorage.setItem("luminaLista", JSON.stringify(favs));
                    render();
                }, 400); 
            }
        }

        window.onload = render;
    </script>
</body>
</html>
