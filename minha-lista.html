<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuminaPlay | Minha Lista</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER PADRÃO -->
<header class="site-header">
  <div class="header-inner container">

    <div class="logo">
      <span class="logoL">L</span>umina<span class="logoPlay">Play</span>
    </div>

    <nav class="main-nav" aria-label="Menu principal">
      <a class="nav-link active" href="index.html">Início</a>
      <a class="nav-link" href="filme.html">Filmes</a>
      <a class="nav-link" href="series.html">Séries</a>
      <a class="nav-link" href="minha-lista.html">
        <i class="fa-solid fa-bookmark"></i> Minha Lista
      </a>
    </nav>

  </div>
</header>

<!-- CONTEÚDO -->
<main class="container" style="margin-top:90px">

  <h2 style="margin-bottom:20px">📌 Minha Lista</h2>

  <div class="row">
    <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="row-cards" id="lista"></div>
    <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
  </div>

</main>

<script>
const lista = document.getElementById("lista");

/* ===== PEGAR LISTA ===== */
function getFav(){
  return JSON.parse(localStorage.getItem("minhaLista") || "[]");
}

/* ===== RENDER ===== */
function render(){

  if(!lista) return;

  lista.innerHTML = "";

  const favs = getFav();

  if(!favs.length){
    lista.innerHTML = "<p style='opacity:.7'>Sua lista está vazia 😢</p>";
    return;
  }

  favs.forEach(movie => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : ''}" alt="${movie.title}">
    `;

    card.onclick = () => openPlayer();

    /* BOTÃO REMOVER */
    const btn = document.createElement("button");
    btn.innerHTML = "❌";
    btn.style.position = "absolute";
    btn.style.top = "5px";
    btn.style.right = "5px";
    btn.style.background = "#000";
    btn.style.border = "none";
    btn.style.color = "#fff";
    btn.style.cursor = "pointer";

    btn.onclick = (e) => {
      e.stopPropagation();
      remove(movie.id);
    };

    card.style.position = "relative";
    card.appendChild(btn);

    lista.appendChild(card);
  });
}

/* ===== REMOVER ===== */
function remove(id){
  let favs = getFav().filter(m => m.id !== id);
  localStorage.setItem("minhaLista", JSON.stringify(favs));
  render();
}

/* ===== PLAYER SIMPLES ===== */
function openPlayer(){
  alert("Player pode ser integrado aqui igual ao index 😉");
}

/* ===== SETAS DA LISTA ===== */
document.querySelectorAll('.row').forEach(row => {
  const left = row.querySelector('.left');
  const right = row.querySelector('.right');
  const container = row.querySelector('.row-cards');

  left.onclick = () => container.scrollBy({ left: -300, behavior: 'smooth' });
  right.onclick = () => container.scrollBy({ left: 300, behavior: 'smooth' });
});

render();
</script>

</body>
</html>
