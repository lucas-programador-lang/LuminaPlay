<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Minha Lista</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Estilos específicos para a Grade de Favoritos */
        .content { padding-bottom: 100px; } 

        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            padding: 20px 50px;
            width: 100%;
        }

        .card {
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .card:hover img {
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        /* Botão Remover Estilizado */
        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 38px;
            height: 38px;
            background: rgba(255, 0, 0, 0.9);
            border: 2px solid white;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            opacity: 0; 
            transform: scale(0.8);
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .card:hover .remove-btn {
            opacity: 1;
            transform: scale(1);
        }

        .remove-btn:hover {
            background: #ff0000;
            transform: scale(1.1) !important;
        }

        /* Animação de remoção */
        .removing {
            transform: scale(0.5);
            opacity: 0;
        }

        @media (max-width: 768px) {
            .fav-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                padding: 20px;
                gap: 15px;
            }
            .remove-btn {
                opacity: 1; 
                transform: scale(1);
            }
            header { padding: 30px 20px 10px !important; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="logo.png" alt="Lumina Play Logo" class="logo-horizontal">
        </div>

        <ul class="nav-links">
            <li onclick="location.href='index.html'" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar" onclick="location.href='index.html'"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li class="active" onclick="location.href='minha-lista.html'" title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li onclick="location.href='filme.html'" title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li onclick="location.href='series.html'" title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <header style="padding: 40px 50px 10px; margin-top: 60px;">
            <h2 style="font-size: 2.2rem; border-left: 5px solid #00e5ff; padding-left: 15px; font-weight: 800;">Minha Lista</h2>
            <p style="opacity: 0.6; margin-top: 5px; font-size: 1rem;">Filmes e séries que você salvou para assistir.</p>
        </header>

        <div id="lista" class="fav-grid">
            </div>
    </main>

    <script>
        const listaContainer = document.getElementById("lista");

        function getFav() {
            return JSON.parse(localStorage.getItem("luminaLista") || "[]");
        }

        function render() {
            if (!listaContainer) return;
            const favs = getFav();

            if (favs.length === 0) {
                listaContainer.style.display = "block";
                listaContainer.innerHTML = `
                    <div style="text-align: center; padding: 100px 20px; opacity: 0.4;">
                        <i class="fa-solid fa-wand-magic-sparkles" style="font-size: 4rem; margin-bottom: 20px; display: block;"></i>
                        <p style="font-size: 1.2rem;">Sua lista está vazia.<br>Explore o catálogo e adicione favoritos!</p>
                        <button onclick="location.href='index.html'" style="margin-top:20px; padding: 12px 25px; border-radius: 25px; border: 1px solid #00e5ff; background: transparent; color: #00e5ff; cursor: pointer; font-weight: bold; transition: 0.3s;">Voltar ao Início</button>
                    </div>`;
                return;
            }

            listaContainer.style.display = "grid";
            listaContainer.innerHTML = "";

            favs.forEach(item => {
                const card = document.createElement("div");
                card.className = "card";
                card.id = `card-${item.id}`;

                const imgPath = item.poster_path ? 'https://image.tmdb.org/t/p/w500' + item.poster_path : 'https://via.placeholder.com/500x750?text=Sem+Imagem';
                
                // Usando uma string segura para o objeto para evitar erros de sintaxe no onclick
                card.innerHTML = `
                    <img src="${imgPath}" alt="${item.title || item.name}" class="movie-img">
                    <button class="remove-btn" title="Remover" onclick="removeMovie(event, ${item.id})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;

                // Clique para ir para detalhes
                card.querySelector('.movie-img').onclick = () => {
                    localStorage.setItem('lumina_selectedMovie', JSON.stringify(item));
                    window.location.href = 'filme.html';
                };

                listaContainer.appendChild(card);
            });
        }

        function removeMovie(event, id) {
            event.stopPropagation(); 
            
            const card = document.getElementById(`card-${id}`);
            if(card) {
                card.classList.add('removing'); 

                setTimeout(() => {
                    let favs = getFav().filter(m => m.id !== id);
                    localStorage.setItem("luminaLista", JSON.stringify(favs));
                    render();
                }, 300);
            }
        }

        // Inicializa a renderização ao carregar
        render();
    </script>
</body>
</html>
