<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuminaPlay</title>

<meta name="description" content="LuminaPlay - streaming de filmes e séries com trailers e ranking de filmes.">

<link rel="icon" href="favicon.svg" type="image/svg+xml">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">
<span class="logoL">L</span>umina<span class="logoPlay">Play</span>
</div>

<nav aria-label="Menu principal">
<a href="index.html">Início</a>
<a href="filmes.html">Filmes</a>
<a href="series.html">Séries</a>
<a href="animes.html">Animes</a>
</nav>

<div class="header-actions">

<button onclick="toggleTheme()" class="theme-btn">
🌙
</button>

<button onclick="loadFavorites()" class="fav-btn">
❤️
</button>

</div>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Buscar filmes..."
aria-label="Buscar filmes">

</div>

</header>


<section class="banner">

<div class="banner-overlay"></div>

<div class="banner-text">

<h1>Streaming ilimitado</h1>
<p>Filmes e séries em um só lugar</p>

<button>Assistir agora</button>

</div>

</section>


<main>

<section class="movies-section">

<h2>🔥 Top 10 Filmes Populares</h2>

<div class="carousel">

<button class="arrow left" aria-label="Anterior">‹</button>

<div class="movies" id="popularMovies"></div>

<button class="arrow right" aria-label="Próximo">›</button>

</div>

</section>


<section class="movies-section">

<h2>⭐ Em Alta</h2>

<div class="carousel">

<button class="arrow left" aria-label="Anterior">‹</button>

<div class="movies" id="trendingMovies"></div>

<button class="arrow right" aria-label="Próximo">›</button>

</div>

</section>


<section class="movies-section">

<h2>🔎 Resultados da Busca</h2>

<div class="movies" id="searchResults"></div>

</section>

</main>


<!-- MODAL TRAILER -->

<div id="movieModal" class="modal">

<div class="modal-content">

<span class="close" aria-label="Fechar">&times;</span>

<iframe
id="movieTrailer"
width="100%"
height="450"
src=""
frameborder="0"
loading="lazy"
allowfullscreen>
</iframe>

</div>

</div>


<footer>

<p>© 2026 LuminaPlay</p>

</footer>


<script src="script.js"></script>

</body>
</html>
