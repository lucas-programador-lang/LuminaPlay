<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>LuminaPlay | Streaming de Filmes e Séries</title>
  <meta name="description" content="Assista filmes e séries no LuminaPlay">

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header" id="siteHeader">
  <div class="header-inner container">

    <!-- LOGO -->
    <div class="logo">
      <span class="logoL">Lumina</span><span class="logoPlay">Play</span>
    </div>

    <!-- NAV -->
    <nav class="main-nav">
      <a class="nav-link active" href="index.html">Início</a>
      <a class="nav-link" href="filme.html">Filmes</a>
      <a class="nav-link" href="series.html">Séries</a>
      <a class="nav-link" href="minha-lista.html">
        <i class="fa-solid fa-bookmark"></i> Minha Lista
      </a>
    </nav>

    <!-- SEARCH -->
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="Buscar...">
    </div>

  </div>
</header>

<!-- HERO -->
<section id="hero" class="hero">
  <div class="hero-content container">
    <h1 id="heroTitle"></h1>
    <p id="heroOverview"></p>

    <div class="hero-actions">
      <button id="heroWatch" class="btn btn-watch">
        <i class="fa-solid fa-play"></i> Assistir
      </button>

      <button id="heroFav" class="btn btn-info">
        <i class="fa-solid fa-plus"></i> Minha Lista
      </button>
    </div>
  </div>
</section>

<!-- ROWS -->
<main class="rows container">

  <section>
    <h2 class="row-title">▶ Continuar assistindo</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div id="row-continuar" class="row-cards"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

  <section>
    <h2 class="row-title">🔥 Populares</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div id="row-populares" class="row-cards"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

  <section>
    <h2 class="row-title">⭐ Em Alta</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div id="row-emalta" class="row-cards"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

  <section>
    <h2 class="row-title">🎬 Lançamentos</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div id="row-lancamentos" class="row-cards"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

  <section>
    <h2 class="row-title">💡 Recomendados</h2>
    <div class="row">
      <button class="row-arrow left"><i class="fa-solid fa-chevron-left"></i></button>
      <div id="row-recomendados" class="row-cards"></div>
      <button class="row-arrow right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </section>

</main>

<!-- PLAYER -->
<div id="playerOverlay" class="player-overlay">
  <div class="player-inner">

    <button id="playerClose" class="player-close">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <iframe id="playerFrame"
      class="player-iframe"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div>© 2026 LuminaPlay</div>
  </div>
</footer>

<!-- SCRIPT -->
<script src="script.js"></script>

<!-- HEADER SCROLL -->
<script>
window.addEventListener("scroll", () => {
  const header = document.getElementById("siteHeader");
  if(window.scrollY > 20){
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
