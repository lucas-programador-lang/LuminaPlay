<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuminaPlay | Streaming de Filmes e Séries</title>

<meta name="description" content="LuminaPlay - streaming de filmes, séries e animes com trailers, ranking e busca inteligente.">

<link rel="icon" href="favicon.svg" type="image/svg+xml">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<header>

<div class="logo">
<span class="logoL">L</span>umina<span class="logoPlay">Play</span>
</div>

<nav aria-label="Menu principal">

<a href="index.html">Início</a>
<a href="filmes.html">Filmes</a>
<a href="series.html">Séries</a>
<a href="animes.html">Animes</a>

</nav>

<div class="header-actions">

<button onclick="toggleTheme()" class="theme-btn" aria-label="Alterar tema">
🌙
</button>

<button onclick="loadFavorites()" class="fav-btn" aria-label="Favoritos">
❤️
</button>

</div>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Buscar filmes, séries ou animes..."
aria-label="Buscar conteúdo">

</div>

</header>


<!-- BANNER -->

<section class="banner">

<div class="banner-overlay"></div>

<div class="banner-text">

<h1>Streaming ilimitado</h1>

<p>Filmes, séries e animes em um só lugar.</p>

<button class="play-btn">
▶ Assistir agora
</button>

</div>

</section>


<!-- CONTEÚDO -->

<main>


<!-- POPULARES -->

<section class="movies-section">

<h2>🔥 Top 10 Filmes Populares</h2>

<div class="carousel">

<button class="arrow left" aria-label="Anterior">
‹
</button>

<div class="movies" id="popularMovies"></div>

<button class="arrow right" aria-label="Próximo">
›
</button>

</div>

</section>


<!-- EM ALTA -->

<section class="movies-section">

<h2>⭐ Em Alta</h2>

<div class="carousel">

<button class="arrow left" aria-label="Anterior">
‹
</button>

<div class="movies" id="trendingMovies"></div>

<button class="arrow right" aria-label="Próximo">
›
</button>

</div>

</section>


<!-- RESULTADOS BUSCA -->

<section class="movies-section">

<h2>🔎 Resultados da Busca</h2>

<div class="movies search-grid" id="searchResults"></div>

</section>


</main>


<!-- MODAL TRAILER -->

<div id="movieModal" class="modal">

<div class="modal-content">

<span class="close" aria-label="Fechar">&times;</span>

<iframe
id="movieTrailer"
width="100%"
height="450"
src=""
frameborder="0"
loading="lazy"
allowfullscreen>
</iframe>

</div>

</div>


<!-- FOOTER -->

<footer>

<p>© 2026 LuminaPlay • Todos os direitos reservados</p>

</footer>


<script src="script.js"></script>

</body>
</html>
