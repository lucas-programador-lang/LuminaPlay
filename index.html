<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Onde a luz encontra a história</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container" onclick="window.location.href='/'" style="cursor: pointer;">
            <img src="/logo.png" alt="Lumina Play Logo" class="logo-horizontal">
        </div>

        <ul class="nav-links">
            <li class="active" title="Início" onclick="window.location.href='/'"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar" onclick="document.getElementById('searchInput').focus(); window.scrollTo({top: 0, behavior: 'smooth'});"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li title="Minha Lista" onclick="window.location.href='/minha-lista.html'"><i class="fa-solid fa-plus"></i></li>
            <li title="Filmes" onclick="window.location.href='/filme.html'"><i class="fa-solid fa-clapperboard"></i></li>
            <li title="Séries" onclick="window.location.href='/series.html'"><i class="fa-solid fa-tv"></i></li>
        </ul>

        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Pesquisar filmes ou séries...">
        </section>

        <div class="row" id="searchRow" style="display: none; padding: 0 4%; margin-top: 20px;">
            <h3 style="border-left: 5px solid #00e5ff; padding-left: 15px;">
                <i class="fa-solid fa-magnifying-glass" style="color: #00e5ff; margin-right: 10px;"></i> 
                Resultados para: <span id="searchTerm" style="color: #00e5ff; font-weight: 300;"></span>
            </h3>
            <div id="row-search-results" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px;"></div>
        </div>

        <div id="main-content-area">
            <section class="hero" id="hero">
                <div class="hero-overlay">
                    <div class="hero-content">
                        <h1 id="heroTitle">Lumina Play</h1>
                        <p id="heroOverview" class="hero-overview">Carregando as melhores histórias...</p>
                        
                        <div class="hero-buttons">
                            <button class="btn-play" id="heroWatch">▶ ASSISTIR AGORA</button>
                            <button class="btn-info" id="heroFav" title="Adicionar à Lista">+</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="categories">
                <div class="category-card" onclick="alert('Filtrando por Lumina Original...')">LUMINA</div>
                <div class="category-card" onclick="alert('Filtrando por Pixar...')">PIXAR</div>
                <div class="category-card" onclick="alert('Filtrando por Marvel...')">MARVEL</div>
                <div class="category-card" onclick="alert('Filtrando por Star Wars...')">WARS</div>
                <div class="category-card" onclick="alert('Filtrando por NatGeo...')">NATGEO</div>
            </section>

            <div class="row">
                <h3><i class="fa-solid fa-fire-flame-curved" style="color: #00e5ff; text-shadow: 0 0 10px #00e5ff; margin-right: 10px;"></i> Populares</h3>
                <div class="carousel-container" style="position: relative;">
                    <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="movie-list row-cards" id="row-populares"></div>
                    <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="row">
                <h3><i class="fa-solid fa-star" style="color: #00e5ff; text-shadow: 0 0 10px #00e5ff; margin-right: 10px;"></i> Em Alta</h3>
                <div class="carousel-container" style="position: relative;">
                    <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="movie-list row-cards" id="row-emalta"></div>
                    <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="row">
                <h3><i class="fa-solid fa-calendar-day" style="color: #00e5ff; text-shadow: 0 0 10px #00e5ff; margin-right: 10px;"></i> Lançamentos</h3>
                <div class="carousel-container" style="position: relative;">
                    <button class="handle left"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="movie-list row-cards" id="row-lancamentos"></div>
                    <button class="handle right"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "d552c7ad4779e6d50cb6de2ac397c6dd";
        const IMG_URL = "https://image.tmdb.org/t/p/original";

        const searchInput = document.getElementById('searchInput');
        const searchRow = document.getElementById('searchRow');
        const searchResults = document.getElementById('row-search-results');
        const mainContentArea = document.getElementById('main-content-area');
        const searchTermSpan = document.getElementById('searchTerm');

        function openPlayer(item) {
            if (!item.media_type) {
                item.media_type = item.title ? 'movie' : 'tv';
            }
            localStorage.setItem('lumina_selectedMovie', JSON.stringify(item));
            // Corrigido para garantir que vá para a página correta a partir da raiz
            window.location.href = '/filme.html';
        }

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();

            if (query.length > 2) {
                searchTimeout = setTimeout(async () => {
                    mainContentArea.style.display = 'none';
                    searchRow.style.display = 'block';
                    searchTermSpan.innerText = query;

                    try {
                        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(query)}`);
                        const data = await res.json();
                        renderMovies(searchResults, data.results);
                    } catch (err) { console.error("Erro na busca:", err); }
                }, 500);
            } else {
                searchRow.style.display = 'none';
                mainContentArea.style.display = 'block';
            }
        });

        function renderMovies(container, list) {
            container.innerHTML = "";
            list.forEach(item => {
                if (!item.poster_path || (item.media_type && item.media_type === 'person')) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${item.poster_path}" alt="${item.title || item.name}" loading="lazy">`;
                
                card.onclick = () => openPlayer(item);
                container.appendChild(card);
            });
        }

        async function fetchMovies(endpoint, rowId) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${API_KEY}&language=pt-BR`);
                const data = await res.json();
                renderMovies(document.getElementById(rowId), data.results);
                return data.results;
            } catch (err) { 
                console.error("Erro ao carregar fileira:", err); 
                return [];
            }
        }

        async function init() {
            const [pops, emAlta, lancamentos] = await Promise.all([
                fetchMovies('/movie/popular', 'row-populares'),
                fetchMovies('/trending/all/week', 'row-emalta'),
                fetchMovies('/movie/now_playing', 'row-lancamentos')
            ]);

            if (pops && pops.length > 0) {
                const movie = pops[Math.floor(Math.random() * 8)];
                const heroElement = document.getElementById('hero');
                const backdrop = movie.backdrop_path || movie.poster_path;
                
                heroElement.style.backgroundImage = `linear-gradient(to top, #040714 15%, transparent 70%), url(${IMG_URL}${backdrop})`;
                document.getElementById('heroTitle').innerText = movie.title || movie.name;
                
                const overview = movie.overview || "Uma história incrível aguarda por você no Lumina Play.";
                document.getElementById('heroOverview').innerText = overview.length > 200 ? overview.substring(0, 200) + "..." : overview;

                document.getElementById('heroWatch').onclick = () => openPlayer(movie);

                document.getElementById('heroFav').onclick = () => {
                    let favs = JSON.parse(localStorage.getItem("luminaLista") || "[]");
                    if (!favs.find(f => f.id === movie.id)) {
                        if (!movie.media_type) movie.media_type = 'movie';
                        favs.push(movie);
                        localStorage.setItem("luminaLista", JSON.stringify(favs));
                        alert("✅ Adicionado à sua lista!");
                    } else {
                        alert("ℹ️ Já está na sua lista!");
                    }
                };
            }

            if ('serviceWorker' in navigator) {
                // Registro do SW agora aponta para a raiz absoluta
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            }
        }

        document.querySelectorAll('.handle').forEach(btn => {
            btn.onclick = () => {
                const list = btn.parentElement.querySelector('.movie-list');
                const direction = btn.classList.contains('left') ? -600 : 600;
                list.scrollBy({ left: direction, behavior: 'smooth' });
            };
        });

        window.onload = init;
    </script>
</body>
</html>
