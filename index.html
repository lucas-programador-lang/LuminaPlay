<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Onde a luz encontra a história</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">L<span>P</span></div>
        <ul class="nav-links">
            <li class="active" title="Início"><i class="icon">🏠</i></li>
            <li title="Pesquisar"><i class="icon">🔍</i></li>
            <li title="Minha Lista"><i class="icon">➕</i></li>
            <li title="Filmes"><i class="icon">🎬</i></li>
            <li title="Séries"><i class="icon">📺</i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero">
            <div class="hero-overlay">
                <div class="hero-content">
                    <img src="https://logodownload.org/wp-content/uploads/2015/12/star-wars-logo-1-1.png" alt="Logo Filme" class="movie-logo">
                    <p>A saga épica continua. Explore os confins da galáxia no Lumina Play.</p>
                    <div class="buttons">
                        <button class="btn-play">▶ ASSISTIR AGORA</button>
                        <button class="btn-info">+</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="categories">
            <div class="category-card"><span>LUMINA</span></div>
            <div class="category-card"><span>PIXAR</span></div>
            <div class="category-card"><span>MARVEL</span></div>
            <div class="category-card"><span>WARS</span></div>
            <div class="category-card"><span>NATGEO</span></div>
        </section>

        <section class="movie-row">
            <h3>Recomendados para Você</h3>
            <div class="carousel-container">
                <button class="handle handle-left" onclick="moveCarousel(-1)">&#10094;</button>
                
                <div class="movie-list" id="movieList">
                    <div class="movie-card"><img src="https://picsum.photos/seed/10/300/450" alt="Filme 1"></div>
                    <div class="movie-card"><img src="https://picsum.photos/seed/20/300/450" alt="Filme 2"></div>
                    <div class="movie-card"><img src="https://picsum.photos/seed/30/300/450" alt="Filme 3"></div>
                    <div class="movie-card"><img src="https://picsum.photos/seed/40/300/450" alt="Filme 4"></div>
                    <div class="movie-card"><img src="https://picsum.photos/seed/50/300/450" alt="Filme 5"></div>
                    <div class="movie-card"><img src="https://picsum.photos/seed/60/300/450" alt="Filme 6"></div>
                    <div class="movie-card"><img src="https://picsum.photos/seed/70/300/450" alt="Filme 7"></div>
                    <div class="movie-card"><img src="https://picsum.photos/seed/80/300/450" alt="Filme 8"></div>
                </div>

                <button class="handle handle-right" onclick="moveCarousel(1)">&#10095;</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
