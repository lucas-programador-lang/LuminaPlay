<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuminaPlay | Streaming</title>

<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- LOADING NETFLIX -->
<div id="loader">
  <h1 class="loader-logo">
    <span class="logoL">L</span>umina<span class="logoPlay">Play</span>
  </h1>
</div>

<header>

<div class="logo">
<span class="logoL">L</span>umina<span class="logoPlay">Play</span>
</div>

<nav>
<a href="index.html">Início</a>
<a href="filmes.html">Filmes</a>
<a href="series.html">Séries</a>
<a href="animes.html">Animes</a>
<a href="minha-lista.html">Minha Lista</a>
</nav>

<div class="header-actions">

<div class="search-box">
<input type="text" id="search" placeholder="Buscar...">
</div>

<button class="theme-btn" onclick="toggleTheme()">
<i class="fa-solid fa-moon"></i>
</button>

<a href="minha-lista.html" class="fav-btn">
<i class="fa-solid fa-heart"></i>
</a>

</div>

</header>

<!-- HERO -->

<section class="hero-carousel">

<div class="hero-slide active" style="background-image:url('https://image.tmdb.org/t/p/original/7RyHsO4yDXtBv1zUU3mTpHeQ0d5.jpg')">
<div class="hero-overlay"></div>
<div class="hero-content">
<h1>Oppenheimer</h1>
<p>Drama épico sobre a bomba atômica.</p>
<button class="hero-btn"><i class="fa-solid fa-play"></i> Assistir</button>
</div>
</div>

<div class="hero-slide" style="background-image:url('https://image.tmdb.org/t/p/original/8YFL5QQVPy3AgrEQxNYVSgiPEbe.jpg')">
<div class="hero-overlay"></div>
<div class="hero-content">
<h1>Duna</h1>
<p>Planeta desértico cheio de poder.</p>
<button class="hero-btn"><i class="fa-solid fa-play"></i> Assistir</button>
</div>
</div>

</section>

<main>

<section class="movies-section">
<h2>🔥 Populares</h2>

<div class="carousel">
<button class="arrow left"><i class="fa-solid fa-chevron-left"></i></button>
<div class="movies" id="popularMovies"></div>
<button class="arrow right"><i class="fa-solid fa-chevron-right"></i></button>
</div>

</section>

<section class="movies-section">
<h2>⭐ Em Alta</h2>

<div class="carousel">
<button class="arrow left"><i class="fa-solid fa-chevron-left"></i></button>
<div class="movies" id="trendingMovies"></div>
<button class="arrow right"><i class="fa-solid fa-chevron-right"></i></button>
</div>

</section>

</main>

<footer>
<p>© 2026 LuminaPlay</p>
</footer>

<script src="script.js"></script>

<script>

// HERO AUTO
const slides = document.querySelectorAll(".hero-slide")
let index = 0

setInterval(()=>{
slides.forEach(s=>s.classList.remove("active"))
index = (index + 1) % slides.length
slides[index].classList.add("active")
},5000)

</script>

</body>
</html>
