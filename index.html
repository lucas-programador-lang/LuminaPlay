<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Onde a luz encontra a história</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">L<span>P</span></div>
        <ul class="nav-links">
            <li class="active" title="Início"><i class="fa-solid fa-house"></i></li>
            <li title="Pesquisar"><i class="fa-solid fa-magnifying-glass"></i></li>
            <li title="Minha Lista"><i class="fa-solid fa-plus"></i></li>
            <li title="Filmes"><i class="fa-solid fa-clapperboard"></i></li>
            <li title="Séries"><i class="fa-solid fa-tv"></i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero" id="hero">
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 id="heroTitle">Lumina Play</h1>
                    <p id="heroOverview">Carregando as melhores histórias...</p>
                    <div class="buttons">
                        <button class="btn-play" id="heroWatch">▶ ASSISTIR AGORA</button>
                        <button class="btn-info" id="heroFav">+</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Pesquisar filmes ou séries...">
        </section>

        <section class="categories">
            <div class="category-card">LUMINA</div>
            <div class="category-card">PIXAR</div>
            <div class="category-card">MARVEL</div>
            <div class="category-card">WARS</div>
            <div class="category-card">NATGEO</div>
        </section>

        <div class="row">
            <h3>Populares</h3>
            <div class="carousel-container">
                <button class="handle left">&#10094;</button>
                <div class="movie-list row-cards" id="row-populares">
                    </div>
                <button class="handle right">&#10095;</button>
            </div>
        </div>

        <div class="row">
            <h3>Em Alta</h3>
            <div class="carousel-container">
                <button class="handle left">&#10094;</button>
                <div class="movie-list row-cards" id="row-emalta"></div>
                <button class="handle right">&#10095;</button>
            </div>
        </div>

        <div class="row">
            <h3>Lançamentos</h3>
            <div class="carousel-container">
                <button class="handle left">&#10094;</button>
                <div class="movie-list row-cards" id="row-lancamentos"></div>
                <button class="handle right">&#10095;</button>
            </div>
        </div>
    </main>

    <div id="playerOverlay" class="player-overlay">
        <div class="player-content">
            <span id="playerClose" class="close-btn">&times;</span>
            <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
