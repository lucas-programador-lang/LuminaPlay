<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Play | Onde a luz encontra a história</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">L<span>P</span></div>
        <ul class="nav-links">
            <li class="active"><i class="icon">🏠</i></li>
            <li><i class="icon">🔍</i></li>
            <li><i class="icon">➕</i></li>
            <li><i class="icon">🎬</i></li>
            <li><i class="icon">📺</i></li>
        </ul>
        <div class="user-profile">
            <img src="https://i.pravatar.cc/150?img=32" alt="Perfil">
        </div>
    </nav>

    <main class="content">
        <section class="hero">
            <div class="hero-overlay">
                <div class="hero-content">
                    <img src="https://logodownload.org/wp-content/uploads/2015/12/star-wars-logo-1-1.png" alt="Logo Filme" class="movie-logo">
                    <p>Em uma galáxia muito, muito distante...</p>
                    <div class="buttons">
                        <button class="btn-play">ASSISTIR AGORA</button>
                        <button class="btn-info">+</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="categories">
            <div class="category-card">LUMINA</div>
            <div class="category-card">PIXAR</div>
            <div class="category-card">MARVEL</div>
            <div class="category-card">WARS</div>
            <div class="category-card">NATGEO</div>
        </section>

        <section class="movie-row">
            <h3>Recomendados para Você</h3>
            <div class="movie-list">
                <div class="movie-card"><img src="https://picsum.photos/seed/1/300/450" alt="Filme"></div>
                <div class="movie-card"><img src="https://picsum.photos/seed/2/300/450" alt="Filme"></div>
                <div class="movie-card"><img src="https://picsum.photos/seed/3/300/450" alt="Filme"></div>
                <div class="movie-card"><img src="https://picsum.photos/seed/4/300/450" alt="Filme"></div>
                <div class="movie-card"><img src="https://picsum.photos/seed/5/300/450" alt="Filme"></div>
            </div>
        </section>
    </main>

</body>
</html>
