<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuminaPlay</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">LuminaPlay</div>

<nav>

<a href="#">Início</a>
<a href="#">Filmes</a>
<a href="#">Séries</a>
<a href="#">Animes</a>

</nav>

<div class="search-box">
<input type="text" id="search" placeholder="Buscar filmes...">
</div>

</header>

<section class="banner">

<div class="banner-overlay"></div>

<div class="banner-text">

<h1>Streaming ilimitado</h1>
<p>Filmes e séries em um só lugar</p>

<button>Assistir agora</button>

</div>

</section>

<main>

<section class="movies-section">

<h2>🔥 Filmes Populares</h2>

<div class="carousel">

<button class="arrow left">‹</button>

<div class="movies" id="popularMovies"></div>

<button class="arrow right">›</button>

</div>

</section>


<section class="movies-section">

<h2>⭐ Em Alta</h2>

<div class="carousel">

<button class="arrow left">‹</button>

<div class="movies" id="trendingMovies"></div>

<button class="arrow right">›</button>

</div>

</section>


<section class="movies-section">

<h2>🔎 Resultados</h2>

<div class="movies" id="searchResults"></div>

</section>

</main>


<div id="movieModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<iframe
id="movieTrailer"
width="100%"
height="450"
src=""
frameborder="0"
allowfullscreen>
</iframe>

</div>

</div>


<footer>

<p>© 2026 LuminaPlay</p>

</footer>

<script src="script.js"></script>

</body>
</html>
